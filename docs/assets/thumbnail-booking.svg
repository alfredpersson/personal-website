<svg width="1200" height="675" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#D9D2C3"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="#F7F2E7"/>
  <rect width="1200" height="675" fill="url(#dots)"/>

  <!-- Calendar icon — navy structure with single amber accent on the highlighted date -->
  <rect x="555" y="118" width="90" height="80" rx="8" fill="#FBF8F1" stroke="#1B2A4E" stroke-width="2.5"/>
  <rect x="555" y="118" width="90" height="28" rx="8" fill="#1B2A4E"/>
  <rect x="555" y="136" width="90" height="10" fill="#1B2A4E"/>
  <rect x="572" y="109" width="8" height="20" rx="4" fill="#1B2A4E"/>
  <rect x="620" y="109" width="8" height="20" rx="4" fill="#1B2A4E"/>
  <circle cx="576" cy="168" r="4.5" fill="#1B2A4E"/>
  <circle cx="600" cy="168" r="4.5" fill="#C77B3D"/>
  <circle cx="624" cy="168" r="4.5" fill="#1B2A4E"/>
  <circle cx="576" cy="186" r="4.5" fill="#1B2A4E"/>
  <circle cx="600" cy="186" r="4.5" fill="#1B2A4E"/>
  <circle cx="624" cy="186" r="4.5" fill="#1B2A4E"/>

  <!-- Headline -->
  <text x="600" y="385" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="96" font-weight="700" fill="#1B2A4E" text-anchor="middle" letter-spacing="-2">Book a Free Call</text>

  <!-- Amber rule -->
  <rect x="540" y="418" width="120" height="4" rx="2" fill="#C77B3D"/>

  <!-- Subtitle -->
  <text x="600" y="475" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="44" font-weight="400" fill="#1B2A4E" fill-opacity="0.7" text-anchor="middle">Alfred Persson</text>

  <!-- Side decorative arcs (warm grey, subtle) -->
  <g opacity="0.18">
    <circle cx="120" cy="337" r="200" fill="none" stroke="#D9D2C3" stroke-width="1.5"/>
    <circle cx="120" cy="337" r="140" fill="none" stroke="#D9D2C3" stroke-width="1.5"/>
    <circle cx="120" cy="337" r="80" fill="none" stroke="#D9D2C3" stroke-width="1.5"/>
  </g>
  <g opacity="0.18">
    <circle cx="1080" cy="337" r="200" fill="none" stroke="#D9D2C3" stroke-width="1.5"/>
    <circle cx="1080" cy="337" r="140" fill="none" stroke="#D9D2C3" stroke-width="1.5"/>
    <circle cx="1080" cy="337" r="80" fill="none" stroke="#D9D2C3" stroke-width="1.5"/>
  </g>
</svg>
